// ─────────────────────────────────────────────────────────────────────────────
// SPACED REPETITION — simple SM2-inspired intervals (in days)
// ─────────────────────────────────────────────────────────────────────────────
const INTERVALS = [0, 1, 3, 7, 14, 30]; // days for mastery levels 0-5
const dayMs = 24 * 60 * 60 * 1000;
const today0 = () => { const d = new Date(); d.setHours(0,0,0,0); return d.getTime(); };

function reviewWord(word, gotIt) {
  const now = Date.now();
  const next = { ...word, lastSeen: now, seen: (word.seen || 0) + 1 };
  if (gotIt) {
    next.correct = (next.correct || 0) + 1;
    next.mastery = Math.min(5, (next.mastery || 0) + 1);
    next.nextDue = today0() + INTERVALS[next.mastery] * dayMs;
    // If mastered enough, remove from notes
    if (next.mastery >= 3) next.inNotes = false;
  } else {
    next.mastery = Math.max(0, (next.mastery || 0) - 1);
    next.nextDue = today0() + 1 * dayMs;
    next.inNotes = true;
  }
  return next;
}

// STORAGE — agora usa localStorage do browser (persiste entre sessões/abas)
// ─────────────────────────────────────────────────────────────────────────────
const STORAGE_KEY = "vocab-review-state";
const API_KEY_KEY = "anthropic-api-key";
const VERSION = 2;

function buildInitialState() {
  const t = today0();
  return {
    version: VERSION,
    words: SEED.map((s) => ({
      id: s.id,
      word: s.w,
      meaning: s.m,
      sentence: s.s,
      month: s.mo,
      mastery: 0,
      seen: 0,
      correct: 0,
      lastSeen: null,
      nextDue: t,
      addedAt: t,
      inNotes: false,
    })),
    stats: {
      streak: 0,
      lastSessionDate: null,
      totalSessions: 0,
      totalCorrect: 0,
      totalSeen: 0,
    },
  };
}

function mergeSeed(base) {
  const ids = new Set(base.words.map((w) => w.id));
  const t = today0();
  const additions = SEED.filter((s) => !ids.has(s.id)).map((s) => ({
    id: s.id, word: s.w, meaning: s.m, sentence: s.s, month: s.mo,
    mastery: 0, seen: 0, correct: 0, lastSeen: null, nextDue: t, addedAt: t, inNotes: false,
  }));
  return additions.length ? { ...base, words: [...base.words, ...additions] } : base;
}

async function loadState() {
  try {
    const value = localStorage.getItem(STORAGE_KEY);
    if (value) {
      const parsed = JSON.parse(value);
      if (parsed.version === VERSION) return mergeSeed(parsed);
    }
  } catch (e) {
    // chave ainda não existe ou JSON inválido — cai no estado inicial
  }
  return buildInitialState();
}

async function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    return true;
  } catch (e) {
    console.error("Save failed:", e);
    return false;
  }
}

// Compact backup: progress + any custom words (seed definitions rebuilt on import)
function exportProgress(state) {
  const payload = {
    v: VERSION,
    stats: state.stats,
    prog: state.words.map((w) => [w.id, w.mastery, w.seen, w.correct, w.lastSeen, w.nextDue, w.inNotes ? 1 : 0]),
    custom: state.words
      .filter((w) => !String(w.id).startsWith("seed-"))
      .map((w) => ({ id: w.id, word: w.word, meaning: w.meaning, sentence: w.sentence, month: w.month })),
  };
  return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
}

function importProgress(code) {
  const payload = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
  const t = today0();
  const base = buildInitialState();
  for (const c of payload.custom || []) {
    if (!base.words.find((w) => w.id === c.id)) {
      base.words.push({ ...c, mastery: 0, seen: 0, correct: 0, lastSeen: null, nextDue: t, addedAt: t, inNotes: false });
    }
  }
  const pmap = new Map((payload.prog || []).map((p) => [p[0], p]));
  base.words = base.words.map((w) => {
    const p = pmap.get(w.id);
    if (!p) return w;
    return { ...w, mastery: p[1], seen: p[2], correct: p[3], lastSeen: p[4], nextDue: p[5], inNotes: !!p[6] };
  });
  base.stats = payload.stats || base.stats;
  return base;
}

function speak(text) {
  if (typeof window === "undefined" || !window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.9;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

// ── Claude API (opcional) para exemplos dinâmicos + traduções ─────────────────
// Standalone: chama a API da Anthropic direto do browser. Só funciona se você
// salvar sua própria chave de API (aba Dicas → engrenagem / painel de backup).
const _translationCache = {};

async function callClaudeJSON(userPrompt) {
  const apiKey = (localStorage.getItem(API_KEY_KEY) || "").trim();
  if (!apiKey) throw new Error("Sem chave de API configurada.");
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: userPrompt }],
    }),
  });
  if (!response.ok) throw new Error("Erro da API: " + response.status);
  const data = await response.json();
  const text = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
  const clean = text.replace(/```json/g, "").replace(/```/g, "").trim();
  return JSON.parse(clean);
}

async function genExample(word, register) {
  const ctx = register === "ti"
    ? "a workplace IT / ServiceNow context (incidents, workflows, platforms, tickets, releases)"
    : "an everyday-life context (travel, food, home, routine, shopping)";
  const prompt = `You are helping a Brazilian learner study the English word or expression "${word}". Write ONE short, natural English example sentence (max 12 words) using "${word}" in ${ctx}. Wrap the exact target "${word}" in square brackets, e.g. [${word}]. Also give a natural Brazilian Portuguese translation of the full sentence. Return ONLY JSON, no markdown, no preamble: {"sentence":"...","translation":"..."}`;
  return await callClaudeJSON(prompt);
}

async function translateSentence(sentence) {
  const plain = sentence.replace(/\[/g, "").replace(/\]/g, "");
  if (_translationCache[plain]) return _translationCache[plain];
  const prompt = `Translate this English sentence to natural Brazilian Portuguese. Return ONLY JSON, no markdown: {"translation":"..."}\nSentence: "${plain}"`;
  const r = await callClaudeJSON(prompt);
  _translationCache[plain] = r.translation;
  return r.translation;
}

function parseSentence(s) {
  // Returns: { before, target, after }
  const m = s.match(/^(.*?)\[([^\]]+)\](.*)$/);
  if (!m) return { before: s, target: "", after: "" };
  return { before: m[1], target: m[2], after: m[3] };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s) {
  return (s || "").toLowerCase().trim().replace(/[.,!?;:'"]/g, "");
}

function updateStreak(stats) {
  const t = today0();
  const last = stats.lastSessionDate;
  if (!last) return { ...stats, streak: 1, lastSessionDate: t };
  if (last === t) return stats; // already counted today
  if (last === t - dayMs) return { ...stats, streak: stats.streak + 1, lastSessionDate: t };
  return { ...stats, streak: 1, lastSessionDate: t };
}

      const s = await loadState();
      setState(s);
      setLoading(false);

  }, []);

  useEffect(() => {
    if (!state) return;
    let cancelled = false;
    (async () => {
      const ok = await saveState(state);
      if (cancelled) return;
      if (ok) { setLastSaved(Date.now()); setSavingError(false); }
      else setSavingError(true);
    })();
    return () => { cancelled = true; };
  }, [state]);

  const updateWords = useCallback((updater) => {
    setState((prev) => ({ ...prev, words: updater(prev.words) }));
  }, []);

  const updateState = useCallback((updater) => {
    setState((prev) => updater(prev));
  }, []);

  const startSession = (scope, mode, dueOnly) => {
    const pool = wordsByScope(scope);
    const t = today0();
    const filtered = dueOnly ? pool.filter((w) => (w.nextDue || 0) <= t) : pool;
    const queue = shuffle(filtered).slice(0, Math.min(20, filtered.length));
    if (queue.length === 0) {
      alert("Nenhuma palavra para revisar agora. Tente outro mês ou desligue 'só vencidas'.");
      return;
    }
    setSession({
      scope, mode, dueOnly,
      queue, index: 0,
      results: [], // { wordId, gotIt }
      done: false,
    });
    setTab("session");
  };

  const handleAnswer = (gotIt) => {
    const cur = session.queue[session.index];
    const reviewed = reviewWord(cur, gotIt);
    updateWords((words) => words.map((w) => (w.id === cur.id ? reviewed : w)));
    const newResults = [...session.results, { wordId: cur.id, gotIt }];
    const nextIndex = session.index + 1;
    if (nextIndex >= session.queue.length) {
      // Done
      const correct = newResults.filter((r) => r.gotIt).length;
      updateState((prev) => ({
        ...prev,
        stats: updateStreak({
          ...prev.stats,
          totalSessions: prev.stats.totalSessions + 1,
          totalCorrect: prev.stats.totalCorrect + correct,
          totalSeen: prev.stats.totalSeen + newResults.length,
        }),
      }));
      setSession({ ...session, results: newResults, done: true });
    } else {
      setSession({ ...session, results: newResults, index: nextIndex });
    }

              </h1>

          </div>
        </div>
      </header>

          </TabBtn>

          </TabBtn>

      {/* Main */}

          )}
          {tab === "session" && session && (
            <Session session={session} onAnswer={handleAnswer} onClose={() => { setSession(null); setTab("review"); }} onReplay={() => startSession(session.scope, session.mode, session.dueOnly)} />
          )}
          {tab === "notes" && <NotesView words={state.words.filter((w) => w.inNotes)} startSession={() => startSession("Notes", "flashcard", false)} removeFromNotes={(id) => updateWords((words) => words.map((w) => (w.id === id ? { ...w, inNotes: false } : w)))} />}
          {tab === "all" && <AllWordsView words={state.words} updateWords={updateWords} />}
          {tab === "dicas" && <DicasView />}
          {tab === "add" && <AddWordView onAdd={(w) => updateWords((words) => [...words, w])} />}
        </div>
      </main>

      <footer className="px-6 py-8 md:px-10" style={{ borderTop: "1px solid var(--line)" }}>
        <div className="max-w-5xl mx-auto">
          <BackupPanel state={state} onImport={(s) => { setState(s); setSession(null); setTab("review"); }} />

            {savingError ? (
              <span>Não consegui salvar automaticamente. Use "Exportar progresso" acima para guardar um backup.</span>
            ) : (
              <span>{lastSaved ? "Progresso salvo automaticamente no navegador." : "Pronto para começar."}</span>
            )}
          </div>
        </div>
      </footer>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// BACKUP PANEL (export / import progress + chave de API opcional)
// ─────────────────────────────────────────────────────────────────────────────
function BackupPanel({ state, onImport }) {
  const [open, setOpen] = useState(false);
  const [mode, setMode] = useState(null); // null | "export" | "import"
  const [code, setCode] = useState("");
  const [importText, setImportText] = useState("");
  const [copied, setCopied] = useState(false);
  const [msg, setMsg] = useState(null);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem(API_KEY_KEY) || "");
  const [keySaved, setKeySaved] = useState(false);

  const doExport = () => {
    try {
      setCode(exportProgress(state));
      setMode("export");
      setMsg(null);
    } catch (e) { setMsg({ ok: false, t: "Erro ao gerar o backup." }); }
  };

  const copy = async () => {
    try {
      await navigator.clipboard.writeText(code);
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    } catch (e) {
      setMsg({ ok: false, t: "Copie o texto manualmente (seleção longa)." });
    }
  };

  const doImport = () => {
    if (!importText.trim()) return;
    if (!confirm("Restaurar o progresso desse backup? Isso substitui o estado atual.")) return;
    try {
      const restored = importProgress(importText);
      onImport(restored);
      setMsg({ ok: true, t: "Progresso restaurado." });
      setImportText("");
      setMode(null);
    } catch (e) {
      setMsg({ ok: false, t: "Código inválido. Confira se copiou tudo." });
    }
  };

  const saveKey = () => {
    const k = apiKey.trim();
    if (k) localStorage.setItem(API_KEY_KEY, k);
    else localStorage.removeItem(API_KEY_KEY);
    setKeySaved(true);
    setTimeout(() => setKeySaved(false), 1800);
  };

  return (
    <div className="text-center">
      <button onClick={() => setOpen(!open)} className="inline-flex items-center gap-2" style={{ fontFamily: "var(--body)", fontSize: "0.8rem", color: "var(--ink-muted)" }}>
        <Bookmark size={13} /> Backup do progresso
        <ChevronRight size={13} style={{ transform: open ? "rotate(90deg)" : "none", transition: "transform 0.2s" }} />
      </button>

      {open && (
        <div className="mt-4 p-5 text-left max-w-xl mx-auto reveal" style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: "2px" }}>
          <p style={{ fontFamily: "var(--body)", fontSize: "0.83rem", color: "var(--ink-muted)", lineHeight: 1.55 }}>
            Seu progresso já fica salvo no navegador (localStorage). Como segurança extra, gere um código e guarde (notas, e-mail). Se algum dia o app abrir zerado, é só colar o código de volta.
          </p>
          <div className="flex gap-2 mt-4">
            <button onClick={doExport} className="px-4 py-2" style={{ background: "var(--ink)", color: "var(--surface)", fontFamily: "var(--body)", fontSize: "0.83rem", borderRadius: "2px" }}>
              Exportar progresso
            </button>
            <button onClick={() => { setMode("import"); setMsg(null); }} className="px-4 py-2" style={{ background: "var(--surface)", color: "var(--ink)", border: "1px solid var(--line)", fontFamily: "var(--body)", fontSize: "0.83rem", borderRadius: "2px" }}>
              Importar progresso
            </button>
          </div>

          {mode === "export" && (
            <div className="mt-4 reveal">
              <textarea readOnly value={code} rows={4} onFocus={(e) => e.target.select()} className="input" style={{ fontFamily: "var(--mono)", fontSize: "0.7rem", wordBreak: "break-all" }} />
              <button onClick={copy} className="mt-2 px-4 py-2 inline-flex items-center gap-2" style={{ background: "var(--success)", color: "var(--surface)", fontFamily: "var(--body)", fontSize: "0.83rem", borderRadius: "2px" }}>
                <Check size={14} /> {copied ? "Copiado" : "Copiar código"}
              </button>
            </div>
          )}

          {mode === "import" && (
            <div className="mt-4 reveal">
              <textarea value={importText} onChange={(e) => setImportText(e.target.value)} rows={4} placeholder="Cole aqui o código do backup..." className="input" style={{ fontFamily: "var(--mono)", fontSize: "0.7rem" }} />
              <button onClick={doImport} className="mt-2 px-4 py-2" style={{ background: "var(--ink)", color: "var(--surface)", fontFamily: "var(--body)", fontSize: "0.83rem", borderRadius: "2px" }}>
                Restaurar
              </button>
            </div>
          )}

          {/* Chave de API opcional — habilita "Outro exemplo" e tradução automática */}
          <div className="mt-5 pt-5" style={{ borderTop: "1px dashed var(--line)" }}>
            <div style={{ fontFamily: "var(--body)", fontSize: "0.75rem", fontWeight: 600, letterSpacing: "0.12em", textTransform: "uppercase", color: "var(--ink-muted)" }}>
              Recursos de IA (opcional)
            </div>
            <p style={{ fontFamily: "var(--body)", fontSize: "0.8rem", color: "var(--ink-muted)", lineHeight: 1.55, marginTop: "0.4rem" }}>
              Para usar "Outro exemplo" e a tradução automática, cole sua chave da API da Anthropic. Ela fica só no seu navegador. Sem chave, o resto do app funciona normalmente.
            </p>
            <input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="sk-ant-..." className="input mt-2" style={{ fontFamily: "var(--mono)", fontSize: "0.78rem" }} />
            <button onClick={saveKey} className="mt-2 px-4 py-2" style={{ background: "var(--ink)", color: "var(--surface)", fontFamily: "var(--body)", fontSize: "0.83rem", borderRadius: "2px" }}>
              {keySaved ? "Salva" : "Salvar chave"}
            </button>
          </div>

          {msg && (
            <div className="mt-3" style={{ fontFamily: "var(--body)", fontSize: "0.82rem", color: msg.ok ? "var(--success)" : "var(--accent)" }}>
              {msg.t}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SESSION
// ─────────────────────────────────────────────────────────────────────────────
function Session({ session, onAnswer, onClose, onReplay }) {
  if (session.done) {
    const correct = session.results.filter((r) => r.gotIt).length;
    const total = session.results.length;
    const pct = Math.round((correct / total) * 100);
    return (
      <div className="max-w-2xl mx-auto text-center py-12">
        <div style={{ fontFamily: "var(--body)", fontSize: "0.75rem", letterSpacing: "0.2em", color: "var(--ink-muted)", textTransform: "uppercase" }}>Sessão finalizada</div>
        <h2 style={{ fontFamily: "var(--display)", fontSize: "clamp(3rem, 7vw, 5rem)", fontWeight: 500, color: "var(--ink)", marginTop: "1rem", lineHeight: 1, letterSpacing: "-0.02em" }}>
          {correct}<span style={{ color: "var(--ink-muted)" }}>/{total}</span>
        </h2>
        <div style={{ fontFamily: "var(--body)", fontSize: "1.1rem", color: pct >= 70 ? "var(--success)" : "var(--accent)", marginTop: "0.5rem" }}>
          {pct}% de acerto
        </div>
        <div className="flex gap-3 justify-center mt-10">
          <button onClick={onReplay} className="px-6 py-3 inline-flex items-center gap-2" style={{ background: "var(--ink)", color: "var(--surface)", fontFamily: "var(--body)", borderRadius: "2px" }}>
            <RotateCcw size={16} /> Nova sessão
          </button>
          <button onClick={onClose} className="px-6 py-3" style={{ background: "var(--surface)", color: "var(--ink)", fontFamily: "var(--body)", border: "1px solid var(--line)", borderRadius: "2px" }}>
            Voltar
          </button>
        </div>
      </div>
    );
  }

  const cur = session.queue[session.index];
  const progress = ((session.index) / session.queue.length) * 100;

  return (
    <div>
      {/* Progress */}
      <div className="flex items-center justify-between mb-6">
        <button onClick={onClose} style={{ fontFamily: "var(--body)", fontSize: "0.8rem", color: "var(--ink-muted)" }}>← Sair da sessão</button>
        <div style={{ fontFamily: "var(--mono)", fontSize: "0.85rem", color: "var(--ink-muted)" }}>
          {session.index + 1} / {session.queue.length}
        </div>
      </div>
      <div className="h-px mb-10" style={{ background: "var(--line)" }}>
        <div className="h-full transition-all" style={{ background: "var(--accent)", width: `${progress}%` }} />
      </div>

      {session.mode === "flashcard" ? <Flashcard word={cur} onAnswer={onAnswer} key={cur.id} /> : <FillBlank word={cur} onAnswer={onAnswer} key={cur.id} />}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// FILL-IN-BLANK MODE
// ─────────────────────────────────────────────────────────────────────────────
function FillBlank({ word, onAnswer }) {
  const [val, setVal] = useState("");
  const [result, setResult] = useState(null); // null | "right" | "wrong"
  const [translation, setTranslation] = useState(null);
  const [translating, setTranslating] = useState(false);
  const inputRef = useRef(null);
  const { before, target, after } = parseSentence(word.sentence);

  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);

  const fetchTranslation = async () => {
    setTranslating(true);
    try {
      const t = await translateSentence(word.sentence);
      setTranslation(t);
    } catch (e) {
      setTranslation("__error__");
    }
    setTranslating(false);
  };

  const check = () => {
    if (!val.trim()) return;
    const ok = normalize(val) === normalize(target) || normalize(val) === normalize(word.word);
    setResult(ok ? "right" : "wrong");
    fetchTranslation();
  };

  const next = (gotIt) => onAnswer(gotIt);

  const blankWidth = `${Math.max(6, target.length + 1)}ch`;

  return (
    <div className="max-w-2xl mx-auto">
      <div className="p-8 md:p-12" style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: "2px", minHeight: "320px" }}>
        <div className="flex items-start justify-between mb-8">
          <span className="month-pill">{word.month}</span>
          <button onClick={() => speak(word.word)} className="p-2 hover:opacity-70" style={{ color: "var(--ink-muted)" }} title="Ouvir">
            <Volume2 size={18} />
          </button>
        </div>

        <div style={{ fontFamily: "var(--body)", fontSize: "0.72rem", letterSpacing: "0.18em", textTransform: "uppercase", color: "var(--ink-muted)" }}>
          Complete a frase
        </div>

        <div style={{ fontFamily: "var(--display)", fontSize: "clamp(1.3rem, 3vw, 1.7rem)", color: "var(--ink)", lineHeight: 1.5, marginTop: "0.6rem", fontWeight: 400 }}>
          {before}
          {result === null ? (
            <input ref={inputRef} type="text" value={val} onChange={(e) => setVal(e.target.value)} onKeyDown={(e) => e.key === "Enter" && check()} className="px-2 mx-1" style={{ fontFamily: "var(--display)", fontSize: "inherit", color: "var(--accent)", background: "transparent", borderBottom: "2px solid var(--accent)", outline: "none", width: blankWidth, fontWeight: 500 }} placeholder="?" />
          ) : (
            <span className="mx-1 px-2" style={{ color: result === "right" ? "var(--success)" : "var(--accent)", fontWeight: 600, borderBottom: `2px solid ${result === "right" ? "var(--success)" : "var(--accent)"}` }}>
              {target}
            </span>
          )}
          {after}
        </div>

        {result !== null && (
          <div className="mt-6 reveal">
            {result === "wrong" && val && (
              <div style={{ fontFamily: "var(--body)", fontSize: "0.9rem", color: "var(--ink-muted)" }}>
                Sua resposta: <span style={{ textDecoration: "line-through" }}>{val}</span>
              </div>
            )}
            <div className="mt-2" style={{ fontFamily: "var(--body)", fontSize: "0.95rem", color: "var(--ink)" }}>
              <em style={{ color: "var(--ink-muted)" }}>Significado:</em> {word.meaning}
            </div>
            <div className="mt-2" style={{ fontFamily: "var(--body)", fontSize: "0.95rem", color: "var(--ink-muted)" }}>
              <em>Tradução:</em>{" "}
              {translating && <span>traduzindo…</span>}
              {!translating && translation && translation !== "__error__" && <span style={{ fontStyle: "italic" }}>{translation}</span>}
              {!translating && translation === "__error__" && (
                <button onClick={fetchTranslation} style={{ color: "var(--accent)", textDecoration: "underline" }}>tentar traduzir de novo</button>
              )}
            </div>
            <ExtraExample word={word} />
          </div>
        )}

        <div className="mt-8">
          {result === null && (
            <button onClick={check} disabled={!val.trim()} className="px-6 py-3 transition-all hover:opacity-90 disabled:opacity-40" style={{ background: "var(--ink)", color: "var(--surface)", fontFamily: "var(--body)", fontSize: "0.9rem", borderRadius: "2px" }}>
              Verificar
            </button>
          )}
          {result === "right" && (
            <button onClick={() => next(true)} className="px-6 py-3 inline-flex items-center gap-2" style={{ background: "var(--success)", color: "var(--surface)", fontFamily: "var(--body)", fontSize: "0.95rem", fontWeight: 500, borderRadius: "2px" }}>
              <Check size={18} /> Próxima
            </button>
          )}
          {result === "wrong" && (
            <div className="flex gap-3">
              <button onClick={() => next(false)} className="px-5 py-3 inline-flex items-center gap-2" style={{ background: "var(--surface)", color: "var(--accent)", border: "1px solid var(--accent)", fontFamily: "var(--body)", fontSize: "0.95rem", fontWeight: 500, borderRadius: "2px" }}>
                <Bookmark size={16} /> Adicionar ao Reforço
              </button>
              <button onClick={() => next(false)} className="px-5 py-3" style={{ background: "var(--ink)", color: "var(--surface)", fontFamily: "var(--body)", fontSize: "0.95rem", fontWeight: 500, borderRadius: "2px" }}>
                Próxima
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// NOTES VIEW
// ─────────────────────────────────────────────────────────────────────────────
function NotesView({ words, startSession, removeFromNotes }) {
  if (words.length === 0) {
    return (
      <div className="text-center py-16">
        <Bookmark size={32} style={{ color: "var(--line)", margin: "0 auto" }} />
        <h3 style={{ fontFamily: "var(--display)", fontSize: "1.6rem", color: "var(--ink)", marginTop: "1rem", fontWeight: 500 }}>
          Reforço vazio
        </h3>
        <p style={{ fontFamily: "var(--body)", color: "var(--ink-muted)", marginTop: "0.5rem" }}>
          Palavras que você errar aparecem aqui automaticamente.
        </p>
      </div>
    );
  }
  return (
    <div>
      <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div>
          <SectionTitle>Reforço</SectionTitle>
          <h2 style={{ fontFamily: "var(--display)", fontSize: "2rem", fontWeight: 500, color: "var(--ink)", marginTop: "0.3rem", lineHeight: 1 }}>
            {words.length} palavras pra reforçar
          </h2>
        </div>
        <button onClick={startSession} className="px-5 py-3 inline-flex items-center gap-2" style={{ background: "var(--ink)", color: "var(--surface)", fontFamily: "var(--body)", borderRadius: "2px" }}>
          Revisar Reforço <ArrowRight size={16} />
        </button>
      </div>
      <div className="space-y-2">
        {words.map((w) => (
          <WordRow key={w.id} word={w} onRemove={() => removeFromNotes(w.id)} />
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ALL WORDS VIEW
// ─────────────────────────────────────────────────────────────────────────────
function AllWordsView({ words, updateWords }) {
  const [filter, setFilter] = useState("Todas");
  const [search, setSearch] = useState("");

  const filtered = useMemo(() => {
    let r = words;
    if (filter !== "Todas") r = r.filter((w) => w.month === filter);
    if (search.trim()) {
      const q = search.toLowerCase();
      r = r.filter((w) => w.word.toLowerCase().includes(q) || w.meaning.toLowerCase().includes(q));
    }
    return r;
  }, [words, filter, search]);

  const remove = (id) => {
    if (!confirm("Apagar essa palavra? Não tem volta.")) return;
    updateWords((words) => words.filter((w) => w.id !== id));
  };

  return (
    <div>
      <div className="flex items-center gap-4 flex-wrap mb-6">
        <div className="flex gap-1">
          {["Todas", ...MONTHS].map((m) => (
            <button key={m} onClick={() => setFilter(m)} className="px-3 py-2" style={{ fontFamily: "var(--body)", fontSize: "0.8rem", color: filter === m ? "var(--surface)" : "var(--ink-muted)", background: filter === m ? "var(--ink)" : "transparent", border: `1px solid ${filter === m ? "var(--ink)" : "var(--line)"}`, borderRadius: "2px" }}>
              {m}
            </button>
          ))}
        </div>
        <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Buscar palavra ou significado..." className="px-3 py-2 flex-1 min-w-[200px]" style={{ fontFamily: "var(--body)", fontSize: "0.85rem", background: "var(--surface)", border: "1px solid var(--line)", color: "var(--ink)", outline: "none", borderRadius: "2px" }} />
      </div>
      <div style={{ fontFamily: "var(--body)", fontSize: "0.8rem", color: "var(--ink-muted)", marginBottom: "1rem" }}>
        {filtered.length} {filtered.length === 1 ? "palavra" : "palavras"}
      </div>
      <div className="space-y-2">
        {filtered.map((w) => (
          <WordRow key={w.id} word={w} onDelete={() => remove(w.id)} />
        ))}
      </div>
    </div>
  );
}

function WordRow({ word, onRemove, onDelete }) {
  const [open, setOpen] = useState(false);
  const { before, target, after } = parseSentence(word.sentence);
  const acc = word.seen > 0 ? Math.round((word.correct / word.seen) * 100) : null;

  return (
    <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: "2px" }}>
      <button onClick={() => setOpen(!open)} className="w-full text-left px-4 py-3 flex items-center justify-between gap-4">
        <div className="flex items-center gap-3 flex-1 min-w-0">
          <MasteryDots mastery={word.mastery} />
          <div className="flex-1 min-w-0">
            <div style={{ fontFamily: "var(--display)", fontSize: "1.15rem", color: "var(--ink)", fontWeight: 500 }}>{word.word}</div>
            <div className="truncate" style={{ fontFamily: "var(--body)", fontSize: "0.82rem", color: "var(--ink-muted)" }}>{word.meaning}</div>
          </div>
        </div>
        <div className="flex items-center gap-3 flex-shrink-0">
          <span className="month-pill">{word.month}</span>
          {acc !== null && <span style={{ fontFamily: "var(--mono)", fontSize: "0.75rem", color: "var(--ink-muted)" }}>{acc}%</span>}
          <ChevronRight size={16} style={{ color: "var(--ink-muted)", transform: open ? "rotate(90deg)" : "none", transition: "transform 0.2s" }} />
        </div>
      </button>
      {open && (
        <div className="px-4 pb-4 reveal">
          <div className="pt-3 mt-1" style={{ borderTop: "1px dashed var(--line)" }}>
            <div style={{ fontFamily: "var(--body)", fontSize: "0.72rem", letterSpacing: "0.15em", textTransform: "uppercase", color: "var(--ink-muted)" }}>Exemplo</div>
            <p style={{ fontFamily: "var(--body)", fontSize: "0.95rem", color: "var(--ink)", marginTop: "0.3rem", lineHeight: 1.5 }}>
              {before}<strong style={{ color: "var(--accent)" }}>{target}</strong>{after}
            </p>
          </div>
          <div className="flex items-center gap-4 mt-4 text-xs" style={{ fontFamily: "var(--body)", color: "var(--ink-muted)" }}>
            <span>Vista {word.seen}x</span>
            {acc !== null && <span>Acerto {acc}%</span>}
            <button onClick={() => speak(word.word)} className="inline-flex items-center gap-1 hover:opacity-70" style={{ color: "var(--accent)" }}>
              <Volume2 size={12} /> Ouvir
            </button>
            <div className="flex-1" />
            {onRemove && (
              <button onClick={onRemove} className="inline-flex items-center gap-1 hover:opacity-70" style={{ color: "var(--success)" }}>
                <Check size={12} /> Remover do Reforço
              </button>
            )}
            {onDelete && (
              <button onClick={onDelete} className="inline-flex items-center gap-1 hover:opacity-70" style={{ color: "var(--accent)" }}>
                <Trash2 size={12} /> Excluir
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function MasteryDots({ mastery }) {
  return (
    <div className="flex gap-1 flex-shrink-0">
      {[0, 1, 2, 3, 4].map((i) => (
        <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: i < mastery ? "var(--gold)" : "var(--line)" }} />
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// DICAS VIEW (grammar / usage reference)
// ─────────────────────────────────────────────────────────────────────────────
function DicasView() {
  const [search, setSearch] = useState("");
  const [openGroups, setOpenGroups] = useState(() => {
    const o = {}; DICAS.forEach((s, i) => { o[s.group] = i === 0; }); return o;
  });

  const q = search.trim().toLowerCase();
  const filtered = useMemo(() => {
    if (!q) return DICAS;
    return DICAS
      .map((s) => ({ ...s, items: s.items.filter((it) => it.title.toLowerCase().includes(q) || it.body.toLowerCase().includes(q)) }))
      .filter((s) => s.items.length > 0);
  }, [q]);

  // When searching, force groups open
  const isOpen = (g) => (q ? true : !!openGroups[g]);
  const toggle = (g) => setOpenGroups((prev) => ({ ...prev, [g]: !prev[g] }));
  const totalHits = filtered.reduce((n, s) => n + s.items.length, 0);

  return (
    <div>
      <SectionTitle>Referência</SectionTitle>
      <h2 style={{ fontFamily: "var(--display)", fontSize: "2rem", fontWeight: 500, color: "var(--ink)", marginTop: "0.3rem", lineHeight: 1 }}>
        Dicas de gramática e uso
      </h2>
      <p style={{ fontFamily: "var(--body)", color: "var(--ink-muted)", marginTop: "0.5rem", fontSize: "0.9rem", maxWidth: "42ch" }}>
        Distinções e regras das suas aulas. Não entram nos flashcards — ficam aqui pra consulta rápida.
      </p>

      <div className="mt-6 relative">
        <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Buscar dica... (ex: launch, gain, irregular)" className="input" style={{ paddingRight: search ? "2.5rem" : "12px" }} />
        {search && (
          <button onClick={() => setSearch("")} className="absolute right-3 top-1/2 -translate-y-1/2" style={{ color: "var(--ink-muted)" }}><X size={16} /></button>
        )}
      </div>
      {q && (
        <div className="mt-2" style={{ fontFamily: "var(--body)", fontSize: "0.8rem", color: "var(--ink-muted)" }}>
          {totalHits} {totalHits === 1 ? "resultado" : "resultados"}
        </div>
      )}

      <div className="mt-6 space-y-3">
        {filtered.length === 0 && (
          <div className="py-10 text-center" style={{ fontFamily: "var(--body)", color: "var(--ink-muted)" }}>
            Nenhuma dica encontrada para "{search}".
          </div>
        )}
        {filtered.map((section) => (
          <div key={section.group} style={{ border: "1px solid var(--line)", borderRadius: "2px", background: "var(--surface)" }}>
            <button onClick={() => toggle(section.group)} className="w-full text-left px-5 py-4 flex items-center justify-between">
              <h3 style={{ fontFamily: "var(--display)", fontSize: "1.2rem", fontWeight: 500, color: "var(--accent)", fontStyle: "italic" }}>
                {section.group}
                <span style={{ fontFamily: "var(--body)", fontSize: "0.72rem", fontStyle: "normal", color: "var(--ink-muted)", marginLeft: "0.6rem" }}>
                  {section.items.length}
                </span>
              </h3>
              <ChevronRight size={16} style={{ color: "var(--ink-muted)", transform: isOpen(section.group) ? "rotate(90deg)" : "none", transition: "transform 0.2s" }} />
            </button>
            {isOpen(section.group) && (
              <div className="px-5 pb-5 grid grid-cols-1 sm:grid-cols-2 gap-3 reveal">
                {section.items.map((it) => (
                  <div key={it.title} className="p-4" style={{ background: "var(--bg)", border: "1px solid var(--line)", borderRadius: "2px" }}>
                    <div className="flex items-center justify-between gap-2">
                      <div style={{ fontFamily: "var(--mono)", fontSize: "0.92rem", fontWeight: 500, color: "var(--ink)" }}>
                        {it.title}
                      </div>
                      {it.speak && (
                        <button onClick={() => speak(it.speak)} className="p-1 hover:opacity-70 flex-shrink-0" style={{ color: "var(--accent)" }} title="Ouvir">
                          <Volume2 size={15} />
                        </button>
                      )}
                    </div>
                    <p style={{ fontFamily: "var(--body)", fontSize: "0.86rem", color: "var(--ink-muted)", marginTop: "0.4rem", lineHeight: 1.55 }}>
                      {it.body}
                    </p>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ADD WORD VIEW
// ─────────────────────────────────────────────────────────────────────────────
function AddWordView({ onAdd }) {
  const [word, setWord] = useState("");
  const [meaning, setMeaning] = useState("");
  const [sentence, setSentence] = useState("");
  const [month, setMonth] = useState("Junho");
  const [saved, setSaved] = useState(false);

  const submit = () => {
    if (!word.trim() || !meaning.trim() || !sentence.trim()) return;
    if (!sentence.includes("[") || !sentence.includes("]")) {
      alert("Marque a palavra-alvo na frase entre colchetes. Ex: We need [reliable] data.");
      return;
    }
    const t = today0();
    onAdd({
      id: `u-${Date.now()}`,
      word: word.trim(),
      meaning: meaning.trim(),
      sentence: sentence.trim(),
      month,
      mastery: 0,
      seen: 0,
      correct: 0,
      lastSeen: null,
      nextDue: t,
      addedAt: t,
      inNotes: false,
    });
    setWord(""); setMeaning(""); setSentence("");
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div className="max-w-xl">
      <SectionTitle>Nova palavra</SectionTitle>
      <h2 style={{ fontFamily: "var(--display)", fontSize: "2rem", fontWeight: 500, color: "var(--ink)", marginTop: "0.3rem", lineHeight: 1 }}>
        Adicione ao seu pool
      </h2>
      <p style={{ fontFamily: "var(--body)", color: "var(--ink-muted)", marginTop: "0.5rem", fontSize: "0.9rem" }}>
        Marque a palavra-alvo na frase entre colchetes. Ex: <code style={{ background: "var(--surface)", padding: "0 4px" }}>We need [reliable] data.</code>
      </p>

      <div className="space-y-4 mt-8">
        <Field label="Palavra ou expressão">
          <input type="text" value={word} onChange={(e) => setWord(e.target.value)} placeholder="ex: streamlined" className="input" />
        </Field>
        <Field label="Significado em português">
          <input type="text" value={meaning} onChange={(e) => setMeaning(e.target.value)} placeholder="ex: otimizado, simplificado" className="input" />
        </Field>
        <Field label="Frase de exemplo (com colchetes)">
          <textarea value={sentence} onChange={(e) => setSentence(e.target.value)} placeholder="ex: The new process is much more [streamlined]." rows={3} className="input" />
        </Field>
        <Field label="Mês">
          <select value={month} onChange={(e) => setMonth(e.target.value)} className="input">
            {MONTHS.map((m) => <option key={m} value={m}>{m}</option>)}
          </select>
        </Field>

        <div className="flex items-center gap-3 pt-2">
          <button onClick={submit} className="px-6 py-3" style={{ background: "var(--ink)", color: "var(--surface)", fontFamily: "var(--body)", borderRadius: "2px" }}>
            Salvar
          </button>
          {saved && <span style={{ color: "var(--success)", fontFamily: "var(--body)", fontSize: "0.9rem" }}>Adicionada</span>}
        </div>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <label style={{ fontFamily: "var(--body)", fontSize: "0.75rem", color: "var(--ink-muted)", textTransform: "uppercase", letterSpacing: "0.12em", display: "block", marginBottom: "0.4rem" }}>
        {label}
      </label>
      {children}
    </div>
  );
}
